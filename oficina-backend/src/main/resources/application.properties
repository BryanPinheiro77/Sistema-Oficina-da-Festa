spring.config.import=optional:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/oficina_da_festa?useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:${spring.datasource.password:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${JWT_SECRET:${security.jwt.secret:}}
security.jwt.expiration-minutes=6000

device.masterKey=${DEVICE_MASTER_KEY:${device.masterKey:}}

# OpenRouteService
delivery.ors.api-key=${ORS_API_KEY:${delivery.ors.api-key:}}
delivery.ors.origin-address=${ORS_ORIGIN_ADDRESS:R. Jequirituba, 29 - Jardim Colonial, São Paulo - SP, 04822-000}

# Faixas de taxa (alteráveis sem mexer no código)
delivery.fee.tier1.max-km=1.0
delivery.fee.tier1.value=5.00
delivery.fee.tier2.max-km=2.0
delivery.fee.tier2.value=7.50
delivery.fee.tier3.max-km=3.0
delivery.fee.tier3.value=10.00
delivery.fee.above-tier3.base=10.00
delivery.fee.above-tier3.per-km=2.50

# Cache
spring.cache.type=simple